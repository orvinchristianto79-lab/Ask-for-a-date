<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Mood ❤️</title>

    <link rel="stylesheet" href="mstyles.css">
</head>
<body>

    <div class="mood-card">

        <h1>How are you feeling today? ❤️</h1>

        <p>
            Choose the emoji that describes your mood right now.
        </p>

        <div class="mood-grid">

            <div class="mood-option">
                <div class="emoji">😍</div>
                <span>Excited</span>
            </div>

            <div class="mood-option">
                <div class="emoji">😊</div>
                <span>Happy</span>
            </div>

            <div class="mood-option">
                <div class="emoji">🥰</div>
                <span>Romantic</span>
            </div>

            <div class="mood-option">
                <div class="emoji">🤗</div>
                <span>Comfortable</span>
            </div>

        </div>

    </div>

    <script src="mood.js"></script>

</body>
</html>
