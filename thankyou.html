<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>See You Soon ❤️</title>

    <link rel="stylesheet" href="tstyles.css" />
  </head>
  <body>
    <div class="thankyou-card">
      <div class="heart">❤️</div>

      <h1>Date Confirmed!</h1>

      <p>Thank you for saying yes.</p>

      <p>I'm looking forward to spending time with you.</p>

      <div class="info-box">
        <h3>📅 Date</h3>
        <p id="selectedDate"></p>
      </div>

      <div class="info-box">
        <h3>😊 Mood</h3>
        <p id="selectedMood"></p>
      </div>

      <div class="info-box">
        <h3>🍜 First stop</h3>
        <p>Bakmiku Kwanji</p>
      </div>
      <div class="info-box">
        <h3>🍦 Second stop</h3>
        <p>Neko Ice Cream Cafe</p>
      </div>

      <div class="info-box">
        <h3>🛵 Pickup</h3>
        <p>18:00</p>
      </div>

      <h2 class="see-you">See You Soon 🥰</h2>
      <img src="asset/Cat Orange GIF.gif" class="happy-gif" />
    </div>

    <script src="thankyou.js"></script>
  </body>
</html>
